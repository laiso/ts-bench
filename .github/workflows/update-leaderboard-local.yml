name: "[v2] Propose Tierlist Update from Local Result"

on:
  workflow_dispatch:
    inputs:
      result_json_url:
        description: 'URL of the result JSON (e.g. Gist raw URL)'
        required: false
        type: string
      result_json_path:
        description: 'Path to result JSON already pushed to the repository'
        required: false
        type: string
      source_label:
        description: 'Label identifying the benchmark source'
        required: false
        type: string
        default: 'local'

run-name: 'Propose Leaderboard Update from ${{ github.event.inputs.source_label }} result'

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: leaderboard-update
  cancel-in-progress: false

jobs:
  create-leaderboard-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch result JSON
        run: |
          set -euo pipefail
          mkdir -p ./current-result
          if [ -n "${{ github.event.inputs.result_json_url }}" ]; then
            curl -fsSL "${{ github.event.inputs.result_json_url }}" -o ./current-result/latest.json
          elif [ -n "${{ github.event.inputs.result_json_path }}" ]; then
            cp "${{ github.event.inputs.result_json_path }}" ./current-result/latest.json
          else
            echo "::error::Either result_json_url or result_json_path must be provided." >&2
            exit 1
          fi
      - name: Update leaderboard JSON
        run: bun scripts/update-leaderboard.ts ./current-result/latest.json

      - name: Prepare commit message file
        id: prepare_commit
        env:
          SOURCE_LABEL: ${{ github.event.inputs.source_label }}
        run: |
          set -euo pipefail
          if [ -f pr-title.txt ] && [ -s pr-title.txt ]; then
            TITLE=$(cat pr-title.txt)
          else
            TITLE="feat(leaderboard): Update from ${SOURCE_LABEL} result"
          fi
          printf "%s\n\n" "$TITLE" > commit-message.txt
          if [ -f commit-body.md ] && [ -s commit-body.md ]; then
            cat commit-body.md >> commit-message.txt
          else
            echo "No detailed diff generated." >> commit-message.txt
          fi
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "message_file=commit-message.txt" >> "$GITHUB_OUTPUT"
      - name: Commit and push changes to a new branch
        id: push_branch
        env:
          SOURCE_LABEL: ${{ github.event.inputs.source_label }}
        run: |
          set -euo pipefail
          BRANCH="leaderboard-update/local-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/results/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git checkout -B "$BRANCH"
          git commit -F commit-message.txt
          git push -u origin "$BRANCH" --force-with-lease
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
      - name: Create Pull Request
        id: create_pr
        if: success() && steps.push_branch.outputs.pushed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${{ steps.push_branch.outputs.branch }}"
          PR_NUMBER=""
          if [ -f commit-body.md ] && [ -s commit-body.md ]; then
            BODY_ARGS=(--body-file commit-body.md)
          else
            BODY_ARGS=(--body "")
          fi
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty' || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH"
            PR_NUMBER="$EXISTING"
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "${{ steps.prepare_commit.outputs.title }}" \
              "${BODY_ARGS[@]}" \
              --label "leaderboard"
            PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty' || true)
          fi
          if [ -n "$PR_NUMBER" ]; then
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Could not determine PR number — pr_number output will be empty"
          fi
      - name: Print manual PR URL if creation failed
        if: steps.push_branch.outputs.pushed == 'true' && steps.create_pr.outcome == 'failure'
        run: |
          BRANCH="${{ steps.push_branch.outputs.branch }}"
          ENCODED_BRANCH=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${BRANCH}', safe=''))")
          REPO="${{ github.repository }}"
          echo "::warning::PR creation failed (GitHub Actions may not be permitted to create PRs in this repo)."
          echo "::warning::To enable it: Settings → Actions → General → Allow GitHub Actions to create and approve pull requests"
          echo "::notice::Or create the PR manually: https://github.com/${REPO}/compare/main...${ENCODED_BRANCH}?expand=1"
