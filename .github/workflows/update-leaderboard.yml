name: "[v2] Propose Tierlist Update from Artifact"

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'The ID of the workflow run that generated the benchmark artifact'
        required: true
        type: string
      artifact_name:
        description: 'The name of the artifact to download (e.g., benchmark-results)'
        required: true
        type: string
        default: 'benchmark-results'

run-name: 'Propose Leaderboard Update from Run ${{ github.event.inputs.run_id }}'

permissions:
  contents: write
  issues: write
  actions: read
  pull-requests: write

concurrency:
  group: leaderboard-update
  cancel-in-progress: false

jobs:
  create-leaderboard-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download benchmark artifact
        uses: dawidd6/action-download-artifact@v8
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.inputs.run_id }}
          name: ${{ github.event.inputs.artifact_name }}
          path: ./current-result

      - name: Find the result file path
        id: find_file
        run: |
          set -euo pipefail
          FILE_PATH=""
          if [ -f ./current-result/latest.json ]; then
            FILE_PATH=./current-result/latest.json
          else
            FILE_PATH=$(find ./current-result -type f -name 'latest.json' -print -quit || true)
            if [ -z "$FILE_PATH" ]; then
              FILE_PATH=$(find ./current-result -type f -name '*.json' -print -quit || true)
            fi
          fi
          if [ -z "$FILE_PATH" ]; then
            echo "::error::No JSON file found in artifact" >&2
            exit 1
          fi
          echo "Found result file: $FILE_PATH"
          echo "result_path=$FILE_PATH" >> $GITHUB_OUTPUT

      - name: Update leaderboard JSON
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.inputs.run_id }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          ARTIFACT_NAME: ${{ github.event.inputs.artifact_name }}
        run: bun scripts/update-leaderboard.ts ${{ steps.find_file.outputs.result_path }}
      - name: Prepare commit message file
        id: prepare_commit
        env:
          RUN_ID: ${{ github.event.inputs.run_id }}
        run: |
          set -euo pipefail
          PR_TITLE=$(cat pr-title.txt 2>/dev/null || echo "feat(leaderboard): Update with results from run ${RUN_ID}")
          printf "%s\n\n" "$PR_TITLE" > commit-message.txt
          if [ -f commit-body.md ] && [ -s commit-body.md ]; then
            cat commit-body.md >> commit-message.txt
          else
            echo "No detailed diff generated." >> commit-message.txt
          fi
          echo "pr_title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          echo "message_file=commit-message.txt" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes to a new branch
        id: push_branch
        env:
          RUN_ID: ${{ github.event.inputs.run_id }}
        run: |
          set -euo pipefail
          BRANCH="leaderboard-update/${RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage only expected files
          git add public/data/results/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git checkout -B "$BRANCH"
          git commit -F commit-message.txt
          git push -u origin "$BRANCH" --force-with-lease
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        id: create_pr
        if: success() && steps.push_branch.outputs.pushed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          PR_TITLE: ${{ steps.prepare_commit.outputs.pr_title }}
        run: |
          set -euo pipefail
          BRANCH="leaderboard-update/${RUN_ID}"
          PR_NUMBER=""
          # Resolve body file (may not exist if update-leaderboard.ts skipped diff)
          if [ -f commit-body.md ] && [ -s commit-body.md ]; then
            BODY_ARGS=(--body-file commit-body.md)
          else
            BODY_ARGS=(--body "")
          fi
          # Check if PR already exists
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty' || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH"
            PR_NUMBER="$EXISTING"
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$PR_TITLE" \
              "${BODY_ARGS[@]}" \
              --label "leaderboard"
            PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty' || true)
          fi
          if [ -n "$PR_NUMBER" ]; then
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Could not determine PR number — pr_number output will be empty"
          fi

      - name: Print manual PR URL if creation failed
        if: steps.push_branch.outputs.pushed == 'true' && steps.create_pr.outcome == 'failure'
        env:
          RUN_ID: ${{ github.event.inputs.run_id }}
        run: |
          BRANCH="leaderboard-update/${RUN_ID}"
          ENCODED_BRANCH=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${BRANCH}', safe=''))")
          REPO="${{ github.repository }}"
          echo "::warning::PR creation failed (GitHub Actions may not be permitted to create PRs in this repo)."
          echo "::warning::To enable it: Settings → Actions → General → Allow GitHub Actions to create and approve pull requests"
          echo "::notice::Or create the PR manually: https://github.com/${REPO}/compare/main...${ENCODED_BRANCH}?expand=1"

      - name: Trigger failure analysis
        if: steps.create_pr.outputs.pr_number != '' && hashFiles('has-failures') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          ARTIFACT_NAME: ${{ github.event.inputs.artifact_name }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          HAS_FAILURES=$(cat has-failures 2>/dev/null || echo "0")
          if [ "$HAS_FAILURES" = "1" ]; then
            gh workflow run analyze-failure.yml \
              -f run_id="${RUN_ID}" \
              -f artifact_name="${ARTIFACT_NAME}" \
              -f pr_number="${PR_NUMBER}"
            echo "✅ Triggered analyze-failure.yml for PR #${PR_NUMBER}"
          else
            echo "ℹ️ All tasks succeeded — skipping failure analysis"
          fi
